<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Barcode Generator with Voice</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --success: #10B981;
            --success-hover: #059669;
            --danger: #EF4444;
            --background: #F8FAFC;
            --card-bg: #FFFFFF;
            --text-main: #0F172A;
            --text-muted: #64748B;
            --border: #E2E8F0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #EEF2F6 0%, #E2E8F0 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            overflow: hidden; /* Mencegah scroll saat loading */
        }

        /* =========================================
           LOADING SCREEN (SVG LOVE ANIMATION)
           ========================================= */
        #loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #EEF2F6 0%, #E2E8F0 100%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #loader-wrapper.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        .heart-svg {
            width: 80px;
            height: 80px;
            overflow: visible;
            filter: drop-shadow(0 8px 16px rgba(79, 70, 229, 0.3));
            animation: beat 1s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }

        .heart-path {
            fill: transparent;
            stroke: var(--primary);
            stroke-width: 1.5;
            stroke-dasharray: 80;
            stroke-dashoffset: 80;
            stroke-linecap: round;
            stroke-linejoin: round;
            animation: 
                drawHeart 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards,
                fillHeart 0.6s 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .loading-text {
            margin-top: 24px;
            color: var(--primary);
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeInText 0.5s 1.5s forwards;
        }

        @keyframes drawHeart {
            to { stroke-dashoffset: 0; }
        }

        @keyframes fillHeart {
            to { fill: var(--primary); }
        }

        @keyframes beat {
            from { transform: scale(1); }
            to { transform: scale(1.15); }
        }

        @keyframes fadeInText {
            to { opacity: 1; }
        }
        /* ========================================= */

        .card {
            background: var(--card-bg);
            padding: 40px 30px 24px 30px; /* Disesuaikan agar muat dengan footer */
            border-radius: 24px;
            box-shadow: 0 20px 40px -15px rgba(15, 23, 42, 0.08);
            width: 100%;
            max-width: 440px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .header icon-box {
            width: 60px;
            height: 60px;
            background: rgba(79, 70, 229, 0.1);
            color: var(--primary);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin: 0 auto 20px;
        }

        h2 {
            color: var(--text-main);
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 32px;
        }

        /* Input Group UX */
        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 14px;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-main);
            background: #F8FAFC;
            transition: all 0.2s ease;
        }

        /* Khusus untuk input data dengan mic agar text tidak tertimpa icon */
        #userInput {
            padding-right: 55px; 
        }

        input:focus {
            border-color: var(--primary);
            background: #FFF;
            outline: none;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        /* Modern Mic Button */
        .mic-btn {
            position: absolute;
            right: 10px;
            width: 40px;
            height: 40px;
            background: #FFF;
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }

        .mic-btn:hover {
            color: var(--primary);
            border-color: var(--primary);
            background: rgba(79, 70, 229, 0.02);
        }

        .mic-btn.listening {
            background: var(--danger);
            color: white;
            border-color: var(--danger);
            animation: pulse-mic 1.5s infinite;
        }

        @keyframes pulse-mic {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 12px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* Action Buttons */
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            box-shadow: 0 6px 16px rgba(79, 70, 229, 0.3);
        }

        .btn-success {
            background: var(--success);
            color: white;
            margin-top: 16px;
            display: none;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }

        .btn-success:hover {
            background: var(--success-hover);
            box-shadow: 0 6px 16px rgba(16, 185, 129, 0.3);
        }

        /* Barcode Display Area */
        .barcode-card {
            margin-top: 28px;
            padding: 24px;
            background: #F8FAFC;
            border: 2px dashed var(--border);
            border-radius: 16px;
            min-height: 140px;
            display: flex;
            flex-direction: column; /* Mengatur susunan judul di atas barcode vertikal */
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .barcode-card.active {
            background: #FFFFFF;
            border-style: solid;
            border-color: rgba(79, 70, 229, 0.2);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        /* Preview Teks Judul Barcode */
        #barcodeTitlePreview {
            display: none;
            font-size: 15px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
            text-align: center;
        }

        #barcode {
            max-width: 100%;
            display: none;
        }

        .placeholder-box {
            color: var(--text-muted);
            font-size: 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }

        .placeholder-box i {
            font-size: 24px;
            color: #94A3B8;
        }

        /* Footer Style Inside Card */
        .card-footer {
            margin-top: 32px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.3px;
        }
        
        .card-footer span {
            font-weight: 600;
            color: var(--primary);
        }
    </style>
</head>
<body>

<div id="loader-wrapper">
    <svg class="heart-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path class="heart-path" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
    </svg>
    <div class="loading-text">Memuat App...</div>
</div>

<div class="card">
    <div class="header">
        <div style="width: 54px; height: 54px; background: #EEF2F6; color: var(--primary); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 20px; margin: 0 auto 16px;">
            <i class="fa-solid fa-barcode"></i>
        </div>
        <h2>Barcode Generator</h2>
        <p class="subtitle">Tekan mic untuk mendikte atau ketik kode item</p>
    </div>
    
    <div class="input-group">
        <label for="titleInput">Judul Barcode (Opsional)</label>
        <div class="input-wrapper">
            <input type="text" id="titleInput" placeholder="Contoh: Produk Premium" autocomplete="off">
        </div>
    </div>

    <div class="input-group">
        <label for="userInput">Data Kode Batang</label>
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="Contoh: 2007..." autocomplete="off">
            <button id="start-record-btn" class="mic-btn" title="Input dengan Suara">
                <i class="fa-solid fa-microphone"></i>
            </button>
        </div>
    </div>
    
    <button class="btn btn-primary" onclick="generateBarcode()">
        <i class="fa-solid fa-wand-magic-sparkles"></i> HASILKAN BARCODE
    </button>

    <div class="barcode-card" id="barcodeCard">
        <div id="barcodeTitlePreview"></div>
        <svg id="barcode"></svg>
        <div id="status-text" class="placeholder-box">
            <i class="fa-solid fa-folder-open"></i>
            <span>Belum ada barcode yang dibuat</span>
        </div>
    </div>

    <button id="downloadBtn" class="btn btn-success" onclick="downloadImage()">
        <i class="fa-solid fa-download"></i> Simpan Gambar (.PNG)
    </button>

    <div class="card-footer">
        Website created by <span>Fredy Uhuyyy 🤏🏻</span>
    </div>
</div>

<script>
    // --- FITUR LOADING SCREEN ---
    window.addEventListener('load', () => {
        const loader = document.getElementById('loader-wrapper');
        const body = document.body;
        
        setTimeout(() => {
            loader.classList.add('fade-out');
            body.style.overflow = 'auto'; 
            
            setTimeout(() => {
                loader.style.display = 'none';
            }, 600); 
        }, 2500); 
    });


    // --- VARIABEL UTAMA ---
    const titleInput = document.getElementById('titleInput');
    const userInput = document.getElementById('userInput');
    const micBtn = document.getElementById('start-record-btn');
    const barcodeElement = document.getElementById('barcode');
    const barcodeCard = document.getElementById('barcodeCard');
    const barcodeTitlePreview = document.getElementById('barcodeTitlePreview');
    const statusText = document.getElementById('status-text');
    const downloadBtn = document.getElementById('downloadBtn');

    // --- FITUR VOICE TO TEXT ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (SpeechRecognition) {
        const recognition = new SpeechRecognition();
        recognition.lang = 'id-ID'; 
        recognition.interimResults = false;

        micBtn.addEventListener('click', () => {
            recognition.start();
            micBtn.classList.add('listening');
        });

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            userInput.value = transcript.replace(/\s/g, ''); 
            micBtn.classList.remove('listening');
        };

        recognition.onspeechend = () => {
            recognition.stop();
            micBtn.classList.remove('listening');
        };

        recognition.onerror = (event) => {
            micBtn.classList.remove('listening');
            if(event.error === 'not-allowed') {
                alert("Akses Mikrofon Ditolak. Harap izinkan mic di browser Anda.");
            } else {
                alert("Error suara: " + event.error);
            }
        };
    } else {
        micBtn.style.display = "none";
    }

    // --- FITUR GENERATE BARCODE ---
    function generateBarcode() {
        const val = userInput.value.trim();
        const titleVal = titleInput.value.trim();

        if (val === "") {
            alert("Harap isi nomor atau kode item terlebih dahulu!");
            return;
        }

        try {
            JsBarcode("#barcode", val, {
                format: "CODE128",
                lineColor: "#0f172a",
                width: 2,
                height: 75,
                displayValue: true,
                fontOptions: "600",
                font: "Plus Jakarta Sans",
                fontSize: 14,
                textMargin: 6
            });
            
            // Atur tampilan judul jika diisi
            if (titleVal !== "") {
                barcodeTitlePreview.textContent = titleVal;
                barcodeTitlePreview.style.display = "block";
            } else {
                barcodeTitlePreview.style.display = "none";
            }

            statusText.style.display = "none";
            barcodeElement.style.display = "block";
            barcodeCard.classList.add('active');
            downloadBtn.style.display = "flex";
        } catch (e) {
            alert("Gagal membuat barcode. Pastikan karakter didukung format CODE128.");
        }
    }

    // --- FITUR DOWNLOAD PREMIUM (TERMASUK JUDUL & ANTI CUT-OFF) ---
    function downloadImage() {
        const svg = document.getElementById('barcode');
        const canvas = document.createElement('canvas');
        const xml = new XMLSerializer().serializeToString(svg);
        const svg64 = btoa(unescape(encodeURIComponent(xml)));
        const image = new Image();
        
        image.onload = function() {
            const titleVal = titleInput.value.trim();
            
            // Cek space ekstra jika ada judul dimasukkan
            let titleSpace = 0;
            if (titleVal !== "") {
                titleSpace = 30; // memberikan ruang ekstra 30px di atas untuk judul
            }

            // Atur ukuran canvas dengan padding putih 40px sekeliling + space judul
            canvas.width = image.width + 40;
            canvas.height = image.height + 40 + titleSpace;
            
            const context = canvas.getContext('2d');
            
            // Warnai background kanvas dengan warna putih penuh
            context.fillStyle = "#FFFFFF";
            context.fillRect(0, 0, canvas.width, canvas.height);
            
            // Gambar teks judul di Canvas jika judul diinput oleh pengguna
            if (titleVal !== "") {
                context.font = "bold 15px 'Plus Jakarta Sans', sans-serif";
                context.fillStyle = "#0F172A"; // Set warna teks sesuai tema utama
                context.textBaseline = "middle";
                context.textAlign = "center";
                // Tulis judul di tengah atas kanvas gambar
                context.fillText(titleVal, canvas.width / 2, 25);
            }
            
            // Gambar barcode SVG ke canvas tepat di bawah judul
            context.drawImage(image, 20, 20 + titleSpace);
            
            // Proses download otomatis gambar PNG
            const a = document.createElement('a');
            a.download = titleVal !== "" ? `Barcode-${titleVal}.png` : `Barcode-${userInput.value}.png`;
            a.href = canvas.toDataURL('image/png');
            a.click();
        };
        image.src = 'data:image/svg+xml;base64,' + svg64;
    }
</script>

</body>
</html>
