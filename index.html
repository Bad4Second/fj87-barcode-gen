<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcode Generator Voice Input</title>
    
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 { color: #333; margin-bottom: 10px; }
        
        /* Container Input dengan Mic */
        .input-wrapper {
            position: relative;
            margin: 20px 0;
        }
        input {
            width: 100%;
            padding: 15px 45px 15px 15px; /* Beri ruang untuk ikon mic */
            border: 2px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 18px;
            transition: 0.3s;
        }
        input:focus {
            border-color: #007bff;
            outline: none;
        }
        .mic-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #007bff;
            cursor: pointer;
            font-size: 20px;
        }
        .mic-btn.listening {
            color: #ff4757;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: translateY(-50%) scale(1); }
            50% { transform: translateY(-50%) scale(1.3); }
            100% { transform: translateY(-50%) scale(1); }
        }

        .btn-create {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: 0.2s;
        }
        .btn-create:hover { background-color: #0056b3; }
        
        .barcode-container {
            margin-top: 25px;
            padding: 20px;
            background: #fafafa;
            border: 2px dashed #ccc;
            border-radius: 10px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #barcode { max-width: 100%; display: none; }
        
        .btn-download {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Barcode Generator</h2>
    <p style="color: #777; font-size: 14px;">Klik ikon mic untuk input suara</p>
    
    <div class="input-wrapper">
        <input type="text" id="userInput" placeholder="Sebutkan angka..." autocomplete="off">
        <button id="start-record-btn" class="mic-btn" title="Gunakan Suara">
            <i class="fa-solid fa-microphone"></i>
        </button>
    </div>
    
    <button class="btn-create" onclick="generateBarcode()">HASILKAN BARCODE</button>

    <div class="barcode-container">
        <svg id="barcode"></svg>
        <div id="status-text">Menunggu input...</div>
    </div>

    <button id="downloadBtn" class="btn-download" onclick="downloadImage()">Simpan Gambar</button>
</div>

<script>
    const userInput = document.getElementById('userInput');
    const micBtn = document.getElementById('start-record-btn');
    const barcodeElement = document.getElementById('barcode');
    const statusText = document.getElementById('status-text');
    const downloadBtn = document.getElementById('downloadBtn');

    // --- FITUR VOICE TO TEXT ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (SpeechRecognition) {
        const recognition = new SpeechRecognition();
        recognition.lang = 'id-ID'; // Menggunakan Bahasa Indonesia
        recognition.interimResults = false;

        micBtn.addEventListener('click', () => {
            recognition.start();
            micBtn.classList.add('listening');
        });

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            // Membersihkan spasi dan mengubah kata menjadi angka jika memungkinkan
            userInput.value = transcript.replace(/\s/g, ''); 
            micBtn.classList.remove('listening');
        };

        recognition.onspeechend = () => {
            recognition.stop();
            micBtn.classList.remove('listening');
        };

        recognition.onerror = (event) => {
            micBtn.classList.remove('listening');
            alert("Error suara: " + event.error);
        };
    } else {
        micBtn.style.display = "none";
        console.log("Browser tidak mendukung Speech Recognition.");
    }

    // --- FITUR GENERATE BARCODE ---
    function generateBarcode() {
        const val = userInput.value.trim();

        if (val === "") {
            alert("Input tidak boleh kosong!");
            return;
        }

        try {
            JsBarcode("#barcode", val, {
                format: "CODE128",
                lineColor: "#000",
                width: 2,
                height: 80,
                displayValue: true
            });
            
            statusText.style.display = "none";
            barcodeElement.style.display = "block";
            downloadBtn.style.display = "block";
        } catch (e) {
            alert("Gagal membuat barcode. Gunakan karakter yang valid.");
        }
    }

    // --- FITUR DOWNLOAD ---
    function downloadImage() {
        const svg = document.getElementById('barcode');
        const canvas = document.createElement('canvas');
        const xml = new XMLSerializer().serializeToString(svg);
        const svg64 = btoa(xml);
        const image = new Image();
        
        image.onload = function() {
            canvas.width = image.width + 40;
            canvas.height = image.height + 40;
            const context = canvas.getContext('2d');
            context.fillStyle = "white";
            context.fillRect(0, 0, canvas.width, canvas.height);
            context.drawImage(image, 20, 20);
            
            const a = document.createElement('a');
            a.download = `barcode-${userInput.value}.png`;
            a.href = canvas.toDataURL('image/png');
            a.click();
        };
        image.src = 'data:image/svg+xml;base64,' + svg64;
    }
</script>

</body>
</html>
